server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Basic caching for static assets
  location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    access_log off;
    add_header Cache-Control "public";
  }
}
