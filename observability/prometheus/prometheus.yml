global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'simon-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:4000']
        labels:
          service: 'simon-backend'
          env: 'docker-compose'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
